# English translations for LiaScript Export Server
meta:
  language: English
  code: en

# Header
header:
  title: LiaScript Export Server
  subtitle: Create exports for various LMS and formats

# Source section
source:
  title: 1. Project Source
  tabs:
    upload: File Upload
    git: Git Repository
  upload:
    dropzone: Drop files here or click to select
    hint: ZIP files or multiple files (max. 100MB)
  git:
    url_label: Repository URL *
    url_placeholder: https://github.com/user/repo.git
    branch_label: Branch / Tag
    branch_placeholder: main
    subdir_label: Subdirectory
    subdir_placeholder: docs/

# Export target section
export:
  title: 2. Export Target
  tabs:
    presets: Known Configurations
    formats: Formats

# Format descriptions
formats:
  scorm12:
    title: SCORM 1.2
    subtitle: Legacy Standard
    description: >
      E-learning standard for learning management systems. Widely used but older.
      Suitable for older LMS platforms.
  scorm2004:
    title: SCORM 2004
    subtitle: Modern Standard
    description: >
      Modern version of the SCORM standard with extended features for learning
      paths and assessments. Recommended for current LMS systems.
  ims:
    title: IMS
    subtitle: Content Package
    description: >
      IMS Content Packaging for exchanging learning content between different
      platforms. Standard for cross-platform compatibility.
  web:
    title: Web
    subtitle: Standalone
    description: >
      Standalone HTML website for hosting on any web server.
      Works offline and online. Perfect for self-hosting.
  pdf:
    title: PDF
    subtitle: Document
    description: >
      Portable document format for printing and archiving.
      Ideal for static content and offline reading.
  android:
    title: Android
    subtitle: App Package
    description: >
      Android app package (APK) for installation on Android devices.
      Enables offline access and native app experience.
  json:
    title: JSON
    subtitle: Data Export
    description: >
      Structured data format for programmatic processing and API integration.
      Perfect for developers and automated workflows.
  epub:
    title: EPUB
    subtitle: E-Book
    description: >
      Open e-book format for e-readers and mobile devices.
      Supports reflowable layouts and is compatible with most e-readers.
  rdf:
    title: RDF
    subtitle: Metadata
    description: >
      Resource Description Framework for structured metadata and Linked Data.
      For semantic web applications and metadata export.
  xapi:
    title: xAPI
    subtitle: Learning Analytics
    description: >
      Experience API (xAPI) for Learning Analytics and detailed tracking of
      learning activities. Enables advanced analytics through a Learning Record
      Store (LRS).

