# Export target section
export:
  title: 2. Export-Ziel
  tabs:
    presets: Bekannte Konfigurationen
    formats: Formate

# Format descriptions
formats:
  scorm12:
    title: SCORM 1.2
    subtitle: Legacy Standard
    description: >
      E-Learning-Standard für Lernmanagementsysteme. Weit verbreitet, aber älter.
      Geeignet für ältere LMS-Plattformen.
  scorm2004:
    title: SCORM 2004
    subtitle: Modern Standard
    description: >
      Moderne Version des SCORM-Standards mit erweiterten Funktionen für
      Lernpfade und Bewertungen. Empfohlen für aktuelle LMS-Systeme.
  ims:
    title: IMS
    subtitle: Content Package
    description: >
      IMS Content Packaging für Austausch von Lerninhalten zwischen
      verschiedenen Plattformen. Standard für plattformübergreifende Kompatibilität.
  web:
    title: Web
    subtitle: Standalone
    description: >
      Eigenständige HTML-Website zum Hosten auf beliebigen Webservern.
      Funktioniert offline und online. Perfekt für eigenes Hosting.
  pdf:
    title: PDF
    subtitle: Dokument
    description: >
      Portables Dokumentenformat zum Drucken und Archivieren.
      Ideal für statische Inhalte und Offline-Lektüre.
  android:
    title: Android
    subtitle: App Package
    description: >
      Android-App-Paket (APK) für Installation auf Android-Geräten.
      Ermöglicht Offline-Zugriff und native App-Erfahrung.
  json:
    title: JSON
    subtitle: Data Export
    description: >
      Strukturiertes Datenformat für programmatische Weiterverarbeitung
      und API-Integration. Perfekt für Entwickler und automatisierte Workflows.
  epub:
    title: EPUB
    subtitle: E-Book
    description: >
      Offenes E-Book-Format für E-Reader und mobile Geräte.
      Unterstützt reflowable Layouts und ist kompatibel mit den meisten E-Readern.
  rdf:
    title: RDF
    subtitle: Metadaten
    description: >
      Resource Description Framework für strukturierte Metadaten und Linked Data.
      Für semantische Web-Anwendungen und Metadaten-Export.
  xapi:
    title: xAPI
    subtitle: Learning Analytics
    description: >
      Experience API (xAPI) für Learning Analytics und detailliertes Tracking
      von Lernaktivitäten. Ermöglicht erweiterte Auswertungen über einen
      Learning Record Store (LRS).

