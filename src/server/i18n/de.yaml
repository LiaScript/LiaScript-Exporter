# German translations for LiaScript Export Server
meta:
  language: Deutsch
  code: de

# Header
header:
  title: LiaScript Export Server
  subtitle: Erstellen Sie Exporte für verschiedene LMS und Formate

# Source section
source:
  title: 1. Projekt-Quelle
  tabs:
    upload: Datei-Upload
    git: Git Repository
  upload:
    dropzone: Dateien hier ablegen oder klicken zum Auswählen
    hint: ZIP-Dateien oder mehrere Dateien (max. 100MB)
  git:
    url_label: Repository URL *
